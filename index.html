<!DOCTYPE html>
<html lang="en">

<head>

    <!--
        Name: Brendan Tice
        Date: 05/17/2026

        Purpose:
        This portfolio webpage demonstrates the use of
        HTML, CSS, and JavaScript to create a personal
        portfolio site with navigation, projects,
        contact information, and user interaction.
    -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brendan Tice Portfolio</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        section {
            padding: 20px;
            margin: 20px;
            background-color: white;
            border-radius: 8px;
        }

        .projects img {
            width: 200px;
            height: 120px;
            margin: 10px;
            border: 2px solid #333;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #222;
            color: white;
            border: none;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <header>

        <h1 id="welcomeMessage">
            Welcome to Brendan Tice's Portfolio
        </h1>

    </header>

    <nav>

        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>

    </nav>

    <!-- About Section -->
    <section id="about">

        <h2>About Me</h2>

        <p>
            My name is Brendan Tice. I am a software
            development student with experience in
            technology, troubleshooting, and programming.
            I enjoy gaming, streaming, and learning new
            software development skills.
        </p>

    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects">

        <h2>Projects</h2>

        <a href="https://github.com/" target="_blank">
            <img src="https://via.placeholder.com/200x120.png?text=Project+1"
                alt="Project 1">
        </a>

        <a href="https://github.com/" target="_blank">
            <img src="https://via.placeholder.com/200x120.png?text=Project+2"
                alt="Project 2">
        </a>

        <a href="https://github.com/" target="_blank">
            <img src="https://via.placeholder.com/200x120.png?text=Project+3"
                alt="Project 3">
        </a>

    </section>

    <!-- Contact Section -->
    <section id="contact">

        <h2>Contact Me</h2>

        <form>

            <label>Name:</label>
            <input type="text" placeholder="Enter your name">

            <label>Email:</label>
            <input type="email" placeholder="Enter your email">

            <label>Subject:</label>
            <input type="text" placeholder="Enter subject">

            <label>Message:</label>
            <textarea rows="5"
                placeholder="Enter your message"></textarea>

            <button type="submit">Submit</button>

        </form>

    </section>

    <script>

        // Prompt the user for their name
        var userName = prompt("What is your name?");

        // Update the welcome message dynamically
        if (userName !== null && userName !== "") {

            document.getElementById("welcomeMessage").innerText =
                "Welcome, " + userName +
                ", to Brendan Tice's Portfolio";

        }

    </script>

</body>

</html>
